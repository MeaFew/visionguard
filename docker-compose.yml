version: "3.8"

# Serving-only compose. Export the ONNX model first, e.g.:
#   python scripts/export_onnx.py --model runs/detect/models/real_train/weights/best.pt
# Then start the gRPC server:
#   docker compose up --build

services:
  visionguard-server:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.cpp
    image: visionguard/server:latest
    container_name: visionguard-server
    ports:
      - "50051:50051"
    volumes:
      - ./runs/detect/models/real_train/weights/best.onnx:/app/models/best.onnx:ro
    command: ["--model", "/app/models/best.onnx", "--address", "0.0.0.0:50051"]
