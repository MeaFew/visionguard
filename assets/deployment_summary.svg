<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">VisionGuard detection quality and deployment pipeline</title>
  <desc id="desc">YOLOv8n reaches test mAP50 0.750 on six NEU-DET classes and is exported through ONNX to a C++ gRPC service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <style>
      text { font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; fill: #f8fafc; }
      .muted { fill: #94a3b8; }
      .small { font-size: 16px; }
      .label { font-size: 20px; font-weight: 600; }
      .value { font-size: 31px; font-weight: 700; }
    </style>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="60" y="66" font-size="34" font-weight="700">Real defect detection · training to C++ service</text>
  <text x="60" y="100" class="muted small">NEU-DET test split · 180 images · YOLOv8n · 100 epochs</text>

  <rect x="60" y="136" width="565" height="376" rx="22" fill="#0f172a" fill-opacity=".62" stroke="#1e40af"/>
  <text x="92" y="178" class="label">Per-class AP50</text>
  <g>
    <text x="92" y="224" class="small">patches</text><rect x="230" y="207" width="330" height="22" rx="7" fill="#22c55e"/><text x="575" y="225" class="label">.944</text>
    <text x="92" y="271" class="small">scratches</text><rect x="230" y="254" width="320" height="22" rx="7" fill="#22c55e"/><text x="565" y="272" class="label">.914</text>
    <text x="92" y="318" class="small">inclusion</text><rect x="230" y="301" width="303" height="22" rx="7" fill="#38bdf8"/><text x="548" y="319" class="label">.865</text>
    <text x="92" y="365" class="small">pitted surface</text><rect x="230" y="348" width="269" height="22" rx="7" fill="#38bdf8"/><text x="514" y="366" class="label">.769</text>
    <text x="92" y="412" class="small">rolled-in scale</text><rect x="230" y="395" width="211" height="22" rx="7" fill="#f59e0b"/><text x="456" y="413" class="label">.604</text>
    <text x="92" y="459" class="small">crazing</text><rect x="230" y="442" width="142" height="22" rx="7" fill="#fb7185"/><text x="387" y="460" class="label">.406</text>
  </g>

  <g>
    <rect x="670" y="136" width="220" height="94" rx="18" fill="#1e3a8a"/>
    <text x="700" y="172" class="small">test mAP50</text><text x="700" y="211" class="value">0.750</text>
    <rect x="920" y="136" width="220" height="94" rx="18" fill="#1e293b"/>
    <text x="950" y="172" class="small muted">test mAP50–95</text><text x="950" y="211" class="value">0.422</text>
  </g>

  <text x="670" y="286" class="label">Deployment path</text>
  <g>
    <rect x="670" y="316" width="180" height="70" rx="16" fill="#1e293b" stroke="#60a5fa"/>
    <rect x="950" y="316" width="180" height="70" rx="16" fill="#1e293b" stroke="#60a5fa"/>
    <rect x="670" y="432" width="180" height="70" rx="16" fill="#1e293b" stroke="#60a5fa"/>
    <rect x="950" y="432" width="180" height="70" rx="16" fill="#1e293b" stroke="#60a5fa"/>
    <text x="760" y="358" text-anchor="middle" class="label">Python train</text>
    <text x="1040" y="358" text-anchor="middle" class="label">ONNX export</text>
    <text x="760" y="474" text-anchor="middle" class="label">C++17 gRPC</text>
    <text x="1040" y="474" text-anchor="middle" class="label">Docker / systemd</text>
    <g fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)">
      <path d="M850 351 L950 351"/>
      <path d="M1040 386 C1040 416 900 416 850 452"/>
      <path d="M850 467 L950 467"/>
    </g>
  </g>
  <text x="60" y="566" class="small muted">Six classes · committed evaluation JSON · weights regenerated locally from the documented training step</text>
</svg>
